services:
  postgres:
    image: postgres:15-alpine
    container_name: zay-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /opt/zay/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zay
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    image: ${API_IMAGE:-ghcr.io/zay-app/backend:latest}
    container_name: zay-api
    restart: always
    expose:
      - "5000"
    env_file:
      - /opt/zay/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zay
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: zay-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/zay/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/admin:/var/www/admin:ro
    depends_on:
      - api
    networks:
      - zay
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  zay:
    driver: bridge
