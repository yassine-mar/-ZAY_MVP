services:
  postgres:
    image: postgres:15-alpine
    container_name: zay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zay_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zay_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-zay_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zay_user} -d ${POSTGRES_DB:-zay_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zay

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: zay-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-zay_user}:${POSTGRES_PASSWORD:-zay_dev_password}@postgres:5432/${POSTGRES_DB:-zay_dev}
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zay
    command: sh -c "node migrations/migrate.js && npm run dev"

  adminer:
    image: adminer:latest
    container_name: zay-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres
    networks:
      - zay

volumes:
  postgres_data:
    driver: local

networks:
  zay:
    driver: bridge
